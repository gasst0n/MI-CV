<header
  class="fixed top-0 left-0 w-full h-24 z-40 bg-white/70 dark:bg-black/40 backdrop-blur-md border-b border-slate-200 dark:border-white/10"
>
  <div class="max-w-6xl mx-auto h-full px-6 flex items-center justify-between">
    <!-- Nombre / Rol -->
    <div>
      <h1 class="text-base font-semibold tracking-tight text-blue-600 dark:text-blue-400">
        {{ personal.name }} 🇦🇷
      </h1>
      <p class="text-xs text-slate-600 dark:text-slate-400">
        {{ i18n.t('role') }}
      </p>
    </div>

    <!-- Navegación -->
    <nav class="hidden md:flex gap-6 text-sm">
      <a
        href="#experience"
        class="text-slate-700 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white transition"
      >
        {{ i18n.t('navExperience') }}
      </a>

      <a
        href="#skills"
        class="text-slate-700 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white transition"
      >
        {{ i18n.t('navSkills') }}
      </a>

      <a
        href="#projects"
        class="text-slate-700 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white transition"
      >
        {{ i18n.t('navProjects') }}
      </a>

      <a
        href="#contact"
        class="text-slate-700 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white transition"
      >
        {{ i18n.t('navContact') }}
      </a>
    </nav>
  </div>
</header>
