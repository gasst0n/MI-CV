<div
  class="fixed top-24 left-0 w-full z-30 transition-all duration-500 ease-out"
  [class.opacity-0]="!visible"
  [class.translate-y-[-16px]]="!visible"
>
  <div
    class="max-w-6xl bg-blue-400 mx-auto px-6 py-3 bg-white/70 dark:bg-black/50 backdrop-blur-md border-b border-slate-200 dark:border-white/10"
  >
    <div class="flex flex-wrap gap-2 justify-center">
      <span
        *ngFor="let tech of personal.stack"
        class="px-3 py-1 text-xs rounded-full bg-slate-200 text-slate-900 dark:bg-white/10 dark:text-slate-300 hover:bg-slate-300 dark:hover:bg-white/20 transition"
      >
        {{ tech }}
      </span>
    </div>
  </div>
</div>
