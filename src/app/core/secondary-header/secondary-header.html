<div
  class="fixed top-24 left-0 w-full z-30 transition-all duration-500 ease-out"
  [class.opacity-0]="!visible"
  [class.translate-y-[-16px]]="!visible"
>
  <div class="max-w-6xl mx-auto px-6 py-3 bg-black/50 backdrop-blur-md border-b border-white/10">
    <div class="flex flex-wrap gap-2 justify-center">
      <span
        *ngFor="let tech of personal.stack"
        class="px-3 py-1 text-xs rounded-full bg-white/10 text-slate-300 hover:bg-white/20 transition"
      >
        {{ tech }}
      </span>
    </div>
  </div>
</div>
