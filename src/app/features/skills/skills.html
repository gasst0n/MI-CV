<section id="skills" class="px-6 pt-16 pb-24 max-w-6xl mx-auto scroll-mt-24">
  <div class="text-center mb-16">
    <h2 class="text-3xl md:text-4xl font-semibold mb-4">
      {{ i18n.t('skillsTitle') }}
    </h2>
    <p class="max-w-xl mx-auto text-slate-700 dark:text-slate-300">
      {{ i18n.t('skillsSubtitle') }}
    </p>
  </div>

  <div class="grid md:grid-cols-2 gap-10">
    <div *ngFor="let group of skills" class="glass rounded-2xl p-6 md:p-8">
      <h3 class="text-lg font-semibold mb-4">
        {{ i18n.t(group.titleKey) }}
      </h3>

      <div class="flex flex-wrap gap-2">
        <span
          *ngFor="let skill of group.items"
          class="px-3 py-1 text-sm rounded-full bg-slate-200 text-slate-900 dark:bg-white/10 dark:text-slate-300"
        >
          {{ skill }}
        </span>
      </div>
    </div>
  </div>
</section>
