<section id="experience" class="px-6 pt-16 pb-24 max-w-5xl mx-auto scroll-mt-24">
  <!-- Título de sección -->
  <div class="text-center mb-20">
    <h2 class="text-3xl md:text-4xl font-semibold mb-4">Experiencias Laborales</h2>
    <p class="text-slate-400 max-w-xl mx-auto">
      Experiencia profesional en entornos corporativos, integraciones y desarrollo de soluciones
      tecnológicas.
    </p>
  </div>

  <!-- Cards -->
  <div class="space-y-20 md:space-y-24">
    <div
      *ngFor="let exp of experiences; let i = index"
      class="glass rounded-2xl p-5 md:p-7 reveal transition-all duration-300 hover:-translate-y-1 hover:shadow-xl border border-white/5"
      reveal
      [style.transitionDelay.ms]="i * 160"
    >
      <!-- Header -->
      <div class="flex items-start gap-4 mb-5">
        <!-- Logo empresa -->
        <img
          *ngIf="exp.logo"
          [src]="exp.logo"
          [alt]="exp.company"
          class="w-14 h-14 object-contain rounded-md bg-white p-1"
        />

        <!-- Info principal -->
        <div class="flex flex-1 flex-col md:flex-row md:items-center md:justify-between">
          <div>
            <h3 class="text-xl font-semibold">
              {{ exp.role }}
            </h3>
            <p class="text-sm text-slate-400">
              {{ exp.company }}
            </p>
          </div>

          <span class="mt-3 md:mt-0 text-xs px-3 py-1 rounded-full bg-white/10 text-slate-300">
            {{ exp.period }}
          </span>
        </div>
      </div>

      <!-- Responsabilidades -->
      <ul class="list-disc list-inside space-y-3 text-slate-300 mb-6">
        <li *ngFor="let item of exp.responsibilities">
          {{ item }}
        </li>
      </ul>

      <!-- Stack -->
      <div *ngIf="exp.stack?.length" class="flex flex-wrap gap-2">
        <span
          *ngFor="let tech of exp.stack"
          class="px-3 py-1 text-xs rounded-full bg-white/10 text-slate-300"
        >
          {{ tech }}
        </span>
      </div>
    </div>
  </div>
</section>
