<section id="projects" class="px-6 pt-16 pb-24 max-w-6xl mx-auto scroll-mt-24">
  <div class="text-center mb-16">
    <h2 class="text-3xl md:text-4xl font-semibold mb-4">
      {{ i18n.t('projectsTitle') }}
    </h2>
    <p class="max-w-xl mx-auto text-slate-700 dark:text-slate-300">
      {{ i18n.t('projectsSubtitle') }}
    </p>
  </div>

  <div class="grid md:grid-cols-2 gap-8">
    <div
      *ngFor="let project of projects"
      class="glass rounded-2xl p-6 md:p-8 transition-all duration-300 hover:-translate-y-1 hover:shadow-xl"
    >
      <h3 class="text-xl font-semibold mb-1">
        {{ i18n.t(project.titleKey) }}
      </h3>

      <p class="text-sm text-slate-600 dark:text-slate-400 mb-4">
        {{ i18n.t(project.contextKey) }}
      </p>

      <p class="leading-relaxed mb-6">
        {{ i18n.t(project.descriptionKey) }}
      </p>

      <div class="flex flex-wrap gap-2">
        <span
          *ngFor="let tech of project.stack"
          class="px-3 py-1 text-xs rounded-full bg-slate-200 text-slate-900 dark:bg-white/10 dark:text-slate-300"
        >
          {{ tech }}
        </span>
      </div>
    </div>
  </div>
</section>
