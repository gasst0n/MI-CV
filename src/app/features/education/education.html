<!-- Título de sección -->
<div class="text-center mb-20">
  <h2 class="text-3xl md:text-4xl font-semibold mb-4">Educación</h2>
  <p class="text-slate-400 max-w-xl mx-auto">
    Formación académica orientada al desarrollo de sistemas, programación y soluciones informáticas
    aplicadas a entornos reales.
  </p>
</div>
<div *ngFor="let edu of education" class="glass rounded-2xl p-6 md:p-8">
  <div class="flex items-start gap-4">
    <!-- Logo dinámico -->
    <img
      *ngIf="edu.logo"
      [src]="edu.logo"
      [alt]="edu.institution"
      class="w-14 h-14 object-contain rounded-md bg-white p-1"
    />

    <!-- Texto -->
    <div>
      <h3 class="text-xl font-semibold">
        {{ edu.degree }}
      </h3>

      <p class="text-sm text-slate-400 mb-2">{{ edu.institution }} · {{ edu.period }}</p>

      <p class="text-slate-300 leading-relaxed">
        {{ edu.description }}
      </p>
    </div>
  </div>
</div>
