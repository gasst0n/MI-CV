<div class="text-center mb-20">
  <h2 class="text-3xl md:text-4xl font-semibold mb-4">
    {{ i18n.t('educationTitle') }}
  </h2>
  <p class="max-w-xl mx-auto text-slate-700 dark:text-slate-300">
    {{ i18n.t('educationSubtitle') }}
  </p>
</div>

<div *ngFor="let edu of education" class="glass rounded-2xl p-6 md:p-8">
  <div class="flex items-start gap-4">
    <img
      *ngIf="edu.logo"
      [src]="edu.logo"
      [alt]="i18n.t(edu.institutionKey)"
      class="w-14 h-14 object-contain rounded-md bg-white p-1"
    />

    <div>
      <h3 class="text-xl font-semibold">
        {{ i18n.t(edu.degreeKey) }}
      </h3>

      <p class="text-sm text-slate-600 dark:text-slate-400 mb-2">
        {{ i18n.t(edu.institutionKey) }} · {{ i18n.t(edu.periodKey) }}
      </p>

      <p *ngIf="edu.descriptionKey" class="leading-relaxed">
        {{ i18n.t(edu.descriptionKey) }}
      </p>
    </div>
  </div>
</div>
